<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 404 · lost in space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0f1c 0%, #1a1f35 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            color: #ffffff;
            padding: 1rem;
        }

        /* animated floating orbs */
        .glow-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, rgba(100, 150, 255, 0.4), rgba(180, 100, 255, 0.1) 70%);
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
            animation: floatBlob 18s infinite alternate ease-in-out;
        }

        .glow-blob-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at 70% 20%, rgba(255, 140, 200, 0.35), rgba(255, 200, 100, 0.1) 70%);
            bottom: 0;
            right: 0;
            filter: blur(90px);
            animation: floatBlob2 22s infinite alternate-reverse;
        }

        @keyframes floatBlob {
            0% { transform: translate(-20px, -20px) scale(1); opacity: 0.7; }
            100% { transform: translate(40px, 40px) scale(1.2); opacity: 0.9; }
        }

        @keyframes floatBlob2 {
            0% { transform: translate(30px, -10px) scale(1.1); }
            100% { transform: translate(-50px, 30px) scale(0.9); }
        }

        /* main card */
        .notfound-card {
            position: relative;
            z-index: 20;
            max-width: 650px;
            width: 100%;
            background: rgba(10, 15, 30, 0.55);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 3.5rem 3.5rem 3rem 3rem;
            padding: 3rem 2.5rem 2.8rem;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(180, 220, 255, 0.1) inset;
            text-align: center;
            animation: cardRise 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes cardRise {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 404 animated numbers */
        .glitch-wrapper {
            font-size: 12rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5rem;
            display: flex;
            justify-content: center;
            gap: 0.2rem;
            filter: drop-shadow(0 10px 10px #00000050);
        }

        .digit {
            position: relative;
            display: inline-block;
            color: #f1f4ff;
            text-shadow: 0 0 18px #7aa6ff, 4px 8px 0 #2a1e4a;
            animation: flicker 3s infinite;
            transform-origin: center;
        }

        .digit:nth-child(1) { animation-delay: 0.1s; }
        .digit:nth-child(2) { animation-delay: 0.4s; }
        .digit:nth-child(3) { animation-delay: 0.7s; }

        @keyframes flicker {
            0%, 100% { opacity: 1; transform: scaleY(1) skew(0deg); text-shadow: 0 0 18px #7aa6ff, 4px 8px 0 #2a1e4a; }
            15% { opacity: 0.85; transform: scaleY(1.05) skew(2deg); text-shadow: 0 0 25px #b0c8ff, 2px 4px 0 #3e2c5a; }
            30% { opacity: 1; transform: scaleY(1) skew(-1deg); }
            70% { opacity: 0.95; transform: scaleY(1.02) skew(1deg); text-shadow: 0 0 28px #94b4ff, 3px 6px 0 #2e1e4a; }
        }

        /* Message area */
        .message h2 {
            font-size: 2.5rem;
            font-weight: 500;
            background: linear-gradient(135deg, #ffffff, #cbd5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0rem;
            margin-bottom: 0.7rem;
            letter-spacing: -0.02em;
            text-shadow: 0 0 40px #a0b0ff60;
        }

        .message p {
            font-size: 1.22rem;
            color: rgba(220, 230, 255, 0.9);
            margin-bottom: 2.2rem;
            font-weight: 300;
            backdrop-filter: blur(4px);
            padding: 0 1rem;
        }

        /* animated astronaut */
        .astronaut-container {
            display: flex;
            justify-content: center;
            margin: 1rem 0 2rem 0;
            filter: drop-shadow(0 16px 20px #00000060);
        }

        .astro-icon {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 60% 40% 50% 50%;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 4.5s infinite ease-in-out;
            box-shadow: 0 30px 30px -10px black;
        }

        .astro-icon svg {
            width: 90px;
            height: 90px;
            filter: drop-shadow(0 4px 6px #90a9ff);
            animation: rotateLamp 8s infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-14px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes rotateLamp {
            0% { transform: rotate(-4deg); }
            100% { transform: rotate(4deg); }
        }

        /* home button */
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            color: white;
            font-size: 1.35rem;
            font-weight: 500;
            padding: 0.9rem 2.5rem 0.9rem 2.2rem;
            border-radius: 60px;
            text-decoration: none;
            letter-spacing: 0.02rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            margin: 1rem 0 2rem 0;
            box-shadow: 0 10px 20px -8px #00000080, 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
        }

        .btn-home::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn-home:hover {
            background: rgba(65, 105, 225, 0.4);
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 30px -6px #3050c0, 0 0 20px #7a9eff;
            transform: scale(1.02);
        }

        .btn-home:hover::before {
            transform: translateX(100%);
        }

        .btn-home svg {
            width: 24px;
            height: 24px;
            fill: white;
            transition: transform 0.25s;
        }

        .btn-home:hover svg {
            transform: translateX(-6px) scale(1.1);
        }

        /* decorative star trails */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px 2px rgba(255, 255, 255, 0.8);
            opacity: 0.5;
            z-index: 5;
            pointer-events: none;
            animation: twinkle 4s infinite alternate;
        }

        .star-1 { width: 5px; height: 5px; top: 12%; left: 8%; animation-duration: 2.5s; }
        .star-2 { width: 8px; height: 8px; top: 70%; left: 15%; animation-duration: 4.2s; opacity: 0.7; }
        .star-3 { width: 4px; height: 4px; top: 20%; right: 12%; animation-duration: 3s; }
        .star-4 { width: 7px; height: 7px; bottom: 15%; right: 20%; animation-duration: 5s; opacity: 0.6; }
        .star-5 { width: 10px; height: 10px; top: 45%; left: 10%; animation-duration: 6s; opacity: 0.4; }
        .star-6 { width: 6px; height: 6px; bottom: 30%; left: 80%; animation-duration: 3.7s; }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 30px 5px white; }
        }

        /* extra tiny stars (via many pseudo elements not needed, but we add a bunch with html) */
        .meteor {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), rgba(255,255,255,0));
            transform: rotate(-25deg);
            top: 10%;
            right: -5%;
            opacity: 0.3;
            filter: blur(1px);
            animation: meteorFall 12s infinite linear;
            z-index: 1;
        }

        .meteor-2 {
            top: 40%;
            right: -2%;
            width: 150px;
            animation: meteorFall 19s infinite 5s;
        }

        @keyframes meteorFall {
            0% { transform: translateX(0) translateY(0) rotate(-25deg); opacity: 0.4; }
            70% { opacity: 0.3; }
            100% { transform: translateX(-1200px) translateY(400px) rotate(-25deg); opacity: 0; }
        }

        /* responsive */
        @media (max-width: 500px) {
            .glitch-wrapper { font-size: 8rem; letter-spacing: -0.2rem; }
            .message h2 { font-size: 1.9rem; }
            .notfound-card { padding: 2rem 1.5rem; border-radius: 2.5rem; }
            .btn-home { padding: 0.7rem 1.8rem; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <!-- glowing orbs -->
    <div class="glow-blob" style="top: -50px; left: -50px;"></div>
    <div class="glow-blob-2" style="bottom: -60px; right: -40px;"></div>

    <!-- shooting stars / meteors -->
    <div class="meteor"></div>
    <div class="meteor meteor-2"></div>

    <!-- fixed stars (tiny dots) -->
    <div class="star star-1"></div>
    <div class="star star-2"></div>
    <div class="star star-3"></div>
    <div class="star star-4"></div>
    <div class="star star-5"></div>
    <div class="star star-6"></div>

    <!-- main 404 card -->
    <main class="notfound-card">
        <div class="glitch-wrapper">
            <span class="digit">4</span>
            <span class="digit">0</span>
            <span class="digit">4</span>
        </div>

        <div class="message">
            <h2>✨ lost in orbit</h2>
            <p>Looks like you've drifted into deep space.<br>the page you're looking for is light-years away.</p>
        </div>

        <!-- animated astronaut icon (pure svg with animation) -->
        <div class="astronaut-container">
            <div class="astro-icon">
                <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- helmet -->
                    <circle cx="60" cy="48" r="22" fill="white" stroke="#b3ceff" stroke-width="2.5" />
                    <circle cx="54" cy="44" r="3.5" fill="#c0d4ff" stroke="#8099cc" stroke-width="1.5" />
                    <circle cx="66" cy="44" r="3.5" fill="#c0d4ff" stroke="#8099cc" stroke-width="1.5" />
                    <path d="M54 54 Q60 60, 66 54" stroke="#5f7bbf" stroke-width="2.5" fill="none" stroke-linecap="round" />
                    <!-- suit body -->
                    <rect x="46" y="64" width="28" height="32" rx="6" fill="#dae5ff" stroke="#a0b8e0" stroke-width="2.5" />
                    <!-- life support backpack -->
                    <rect x="30" y="66" width="14" height="24" rx="3" fill="#a7b9dd" stroke="#7e94c0" stroke-width="2" />
                    <rect x="76" y="66" width="14" height="24" rx="3" fill="#a7b9dd" stroke="#7e94c0" stroke-width="2" />
                    <!-- arms -->
                    <path d="M38 70 L26 84" stroke="#b3ceff" stroke-width="8" stroke-linecap="round" fill="none" />
                    <path d="M82 70 L94 84" stroke="#b3ceff" stroke-width="8" stroke-linecap="round" fill="none" />
                    <!-- legs -->
                    <path d="M52 96 L44 114" stroke="#b3ceff" stroke-width="8" stroke-linecap="round" fill="none" />
                    <path d="M68 96 L76 114" stroke="#b3ceff" stroke-width="8" stroke-linecap="round" fill="none" />
                    <!-- floating stars around astronaut -->
                    <circle cx="20" cy="40" r="2.5" fill="#f9f9cf" opacity="0.8">
                        <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
                        <animate attributeName="r" values="2;3;2" dur="3s" repeatCount="indefinite" />
                    </circle>
                    <circle cx="100" cy="30" r="3" fill="#ffec99" opacity="0.7">
                        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite" />
                    </circle>
                    <circle cx="15" cy="90" r="2" fill="#aad0ff" opacity="0.8">
                        <animate attributeName="r" values="2;4;2" dur="5s" repeatCount="indefinite" />
                    </circle>
                </svg>
            </div>
        </div>

        <!-- call to action button with subtle animation -->
        <a href="#" class="btn-home">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                <path d="M12 3L2 12h3v8h6v-6h4v6h6v-8h3L12 3z"/>
            </svg>
            <span>return to base</span>
        </a>

        <!-- small extra detail: animated orbit ring (just for delight) -->
        <div style="position: relative; margin-top: 0.5rem; font-size: 0.9rem; letter-spacing: 2px; color: #b0caff; opacity: 0.6;">
            ✦ ✧ ✦
        </div>
    </main>

    <!-- additional floating starlets (using spans to fill empty space) -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2;">
        <div style="position: absolute; top: 15%; left: 85%; width: 4px; height: 4px; background: white; border-radius: 50%; box-shadow: 0 0 12px cyan; opacity: 0.6; animation: twinkle 5s infinite;"></div>
        <div style="position: absolute; bottom: 20%; left: 10%; width: 6px; height: 6px; background: #f9e8b0; border-radius: 50%; box-shadow: 0 0 16px #ffd966; opacity: 0.5; animation: twinkle 6s infinite 1s;"></div>
        <div style="position: absolute; top: 70%; left: 90%; width: 3px; height: 3px; background: white; border-radius: 50%; box-shadow: 0 0 8px white; animation: twinkle 3.2s infinite;"></div>
        <div style="position: absolute; top: 10%; left: 20%; width: 5px; height: 5px; background: #b3d9ff; border-radius: 50%; filter: blur(1px); animation: twinkle 4.5s infinite 0.3s;"></div>
    </div>
</body>
</html>
