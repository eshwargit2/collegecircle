  <!-- JSON-LD Structured Data for Google -->
  <script type="application/ld+json">

    "@context": "https://schema.org",

    "name": "CollegeCircle",
    "url": "https://collegecircle.app",
    "description": "The social network for your college community. Share moments, connect with classmates, and stay connected on campus.",
    "logo": "https://collegecircle.app/logo.png",
    "publisher": {
      "@type": "Organization",

      "logo": {
        "@type": "ImageObject",
        "url": "https://collegecircle.app/logo.png"
      }
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- SPA redirect handler for GitHub Pages -->
  <script>
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Restore the URL from sessionStorage if redirected from 404.html
    (function(){
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
</body>

</html>
